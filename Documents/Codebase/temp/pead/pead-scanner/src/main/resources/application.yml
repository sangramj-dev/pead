spring:
  application:
    name: pead-scanner
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    streams:
      application-id: pead-scanner
      replication-factor: 1
      properties:
        processing.guarantee: exactly_once_v2
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: org.apache.kafka.common.serialization.Serdes$ByteArraySerde
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8083

pead:
  strategy:
    min-eps-surprise-pct: 3.0
    min-revenue-surprise-pct: 2.0
    min-gap-pct: 5.0
    min-relative-volume: 2.0
    min-pead-score: 60
    max-risk-pct-per-trade: 0.01
    max-concurrent-positions: 5
    daily-loss-limit-pct: 0.02
    max-drawdown-pct: 0.10
    max-position-size-pct: 0.10
    max-sector-concentration-pct: 0.20
    profit-target-1r: 2.0
    profit-target-2r: 3.0
    enable-short-selling: false
    excluded-sectors: []

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.pead.scanner: DEBUG
    org.apache.kafka.streams: INFO
