version: '3.8'

# PEAD Trading Platform - Local Development Infrastructure
# Start with: docker-compose up -d
# Stop with:  docker-compose down
# Reset all:  docker-compose down -v

services:

  # =========================================================================
  # KAFKA (KRaft mode — no Zookeeper)
  # =========================================================================
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    hostname: kafka
    container_name: pead-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - pead-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pead-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: pead-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - pead-network

  # =========================================================================
  # DATABASE
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: pead-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pead
      POSTGRES_PASSWORD: pead
      POSTGRES_DB: pead_earnings_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pead -d pead_earnings_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pead-network

  # =========================================================================
  # CACHE
  # =========================================================================
  redis:
    image: redis:7.2-alpine
    container_name: pead-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pead-network

  # =========================================================================
  # OBSERVABILITY (uncomment when needed)
  # =========================================================================
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: pead-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  #   networks:
  #     - pead-network

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: pead-grafana
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #   networks:
  #     - pead-network

networks:
  pead-network:
    driver: bridge
    name: pead-network

volumes:
  postgres-data:
  redis-data:
