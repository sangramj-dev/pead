server:
  port: 8088

spring:
  application:
    name: pead-backtesting
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/pead_backtesting_db
    username: ${DB_USER:pead}
    password: ${DB_PASSWORD:pead_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

pead:
  strategy:
    min-eps-surprise-pct: 3.0
    min-revenue-surprise-pct: 2.0
    min-gap-pct: 5.0
    min-relative-volume: 2.0
    min-pead-score: 60
    max-risk-pct-per-trade: 0.01
    max-concurrent-positions: 5
    daily-loss-limit-pct: 0.02
    max-drawdown-pct: 0.10
    max-position-size-pct: 0.10
    max-sector-concentration-pct: 0.20
    profit-target-1r: 2.0
    profit-target-2r: 3.0
    enable-short-selling: false
    excluded-sectors: []
  services:
    market-data-url: http://localhost:8082
    earnings-url: http://localhost:8081
